apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zulip-ingress
  namespace: nekazari
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    # Long-polling / WebSocket support for Tornado
    traefik.ingress.kubernetes.io/router.middlewares: ""
  labels:
    app: zulip
spec:
  tls:
    - hosts:
        - YOUR_ZULIP_DOMAIN
      secretName: zulip-tls
  rules:
    - host: YOUR_ZULIP_DOMAIN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zulip-service
                port:
                  number: 80
