apiVersion: apps/v1
kind: Deployment
metadata:
  name: zulip
  namespace: nekazari
  labels:
    app: zulip
    component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zulip
      component: server
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: zulip
        component: server
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z postgresql-service 5432; do sleep 2; done
              echo "Waiting for Redis..."
              until nc -z redis-service 6379; do sleep 2; done
              echo "Waiting for RabbitMQ..."
              until nc -z zulip-rabbitmq-service 5672; do sleep 2; done
              echo "Waiting for Memcached..."
              until nc -z zulip-memcached-service 11211; do sleep 2; done
              echo "All dependencies ready."
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "100m"
      containers:
        - name: zulip
          image: zulip/docker-zulip:9.4-0
          ports:
            - containerPort: 80
              name: http
            - containerPort: 443
              name: https
          env:
            # --- Disable internal SSL (TLS terminates at Traefik) ---
            - name: SSL_CERTIFICATE_GENERATION
              value: "self-signed"
            - name: DISABLE_HTTPS
              value: "true"

            # --- Zulip settings ---
            - name: SETTING_EXTERNAL_HOST
              valueFrom:
                configMapKeyRef:
                  name: zulip-config
                  key: external-host
            - name: SETTING_ZULIP_ADMINISTRATOR
              valueFrom:
                configMapKeyRef:
                  name: zulip-config
                  key: admin-email
            - name: ZULIP_AUTH_BACKENDS
              value: "EmailAuthBackend,GenericOpenIdConnectBackend"
            - name: SETTING_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: zulip-secret
                  key: secret-key

            # --- Database (reuse NKZ PostgreSQL) ---
            # docker-zulip defaults: user=zulip, db=zulip
            # We created role "zulip" and db "zulip" in PostgreSQL
            - name: DB_HOST
              value: "postgresql-service"
            - name: DB_HOST_PORT
              value: "5432"
            - name: SECRETS_postgres_password
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: password

            # --- Redis (reuse NKZ Redis, DB index 3) ---
            - name: SETTING_REDIS_HOST
              value: "redis-service"
            - name: SETTING_REDIS_PORT
              value: "6379"
            - name: SECRETS_redis_password
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password

            # --- RabbitMQ (dedicated in-cluster) ---
            - name: SETTING_RABBITMQ_HOST
              value: "zulip-rabbitmq-service"
            - name: SETTING_RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: zulip-secret
                  key: rabbitmq-user
            - name: SECRETS_rabbitmq_password
              valueFrom:
                secretKeyRef:
                  name: zulip-secret
                  key: rabbitmq-password

            # --- Memcached (dedicated in-cluster) ---
            - name: SETTING_MEMCACHED_LOCATION
              value: "zulip-memcached-service:11211"

            # --- OIDC (Keycloak) ---
            - name: SETTING_SOCIAL_AUTH_OIDC_ENABLED_IDPS
              value: >-
                {"keycloak": {"oidc_url": "https://auth.robotika.cloud/auth/realms/nekazari", "display_name": "Nekazari SSO", "display_icon": None, "client_id": "zulip", "secret": get_secret("social_auth_oidc_secret"), "auto_signup": True}}
            - name: SETTING_SOCIAL_AUTH_OIDC_FULL_NAME_VALIDATED
              value: "True"
            - name: SECRETS_social_auth_oidc_secret
              valueFrom:
                secretKeyRef:
                  name: zulip-secret
                  key: oidc-client-secret

            # --- Email (disabled for PoC) ---
            - name: SETTING_EMAIL_HOST
              value: ""
            - name: SETTING_NOREPLY_EMAIL_ADDRESS
              value: "noreply@robotika.cloud"

            # --- Reverse proxy (Traefik) ---
            - name: SETTING_USE_X_FORWARDED_HOST
              value: "True"
            - name: LOADBALANCER_IPS
              value: "10.42.0.0/16"

            # --- Performance tuning for low-RAM ---
            - name: SETTING_TORNADO_PROCESSES
              value: "1"

          resources:
            requests:
              memory: "512Mi"
              cpu: "25m"
            limits:
              memory: "3Gi"
              cpu: "1500m"
          livenessProbe:
            httpGet:
              path: /api/v1/server_settings
              port: 80
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/v1/server_settings
              port: 80
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 10
          volumeMounts:
            - name: zulip-data
              mountPath: /data
      volumes:
        - name: zulip-data
          persistentVolumeClaim:
            claimName: zulip-data-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zulip-data-pvc
  namespace: nekazari
  labels:
    app: zulip
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
