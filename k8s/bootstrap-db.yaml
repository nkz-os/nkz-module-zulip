apiVersion: batch/v1
kind: Job
metadata:
  name: zulip-bootstrap-db
  namespace: nekazari
  labels:
    app: zulip
    component: bootstrap
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: postgres:14-alpine
          command:
            - sh
            - -c
            - |
              echo "Checking if database nkz_zulip exists..."
              if psql -h postgresql-service -U "$POSTGRES_USER" -lqt | cut -d \| -f 1 | grep -qw nkz_zulip; then
                echo "Database nkz_zulip already exists. Skipping."
              else
                echo "Creating database nkz_zulip..."
                createdb -h postgresql-service -U "$POSTGRES_USER" nkz_zulip
                echo "Database nkz_zulip created."
              fi
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: nekazari-config
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: password
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
