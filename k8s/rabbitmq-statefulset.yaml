apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zulip-rabbitmq
  namespace: nekazari
  labels:
    app: zulip
    component: rabbitmq
spec:
  serviceName: zulip-rabbitmq-service
  replicas: 1
  selector:
    matchLabels:
      app: zulip
      component: rabbitmq
  template:
    metadata:
      labels:
        app: zulip
        component: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: zulip-secret
                  key: rabbitmq-user
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: zulip-secret
                  key: rabbitmq-password
            - name: RABBITMQ_DEFAULT_VHOST
              value: "zulip"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - -q
                - ping
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - -q
                - check_running
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: zulip-rabbitmq-service
  namespace: nekazari
  labels:
    app: zulip
    component: rabbitmq
spec:
  selector:
    app: zulip
    component: rabbitmq
  ports:
    - port: 5672
      targetPort: 5672
      name: amqp
    - port: 15672
      targetPort: 15672
      name: management
