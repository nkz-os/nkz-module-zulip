# DO NOT commit with real values. This is a template.
# Create the secret manually on the server:
#
#   sudo kubectl create secret generic zulip-secret -n nekazari \
#     --from-literal=db-password='CHANGE_ME' \
#     --from-literal=rabbitmq-user='zulip' \
#     --from-literal=rabbitmq-password='CHANGE_ME' \
#     --from-literal=secret-key='CHANGE_ME_LONG_RANDOM_STRING' \
#     --from-literal=oidc-client-secret='FROM_KEYCLOAK'
#
# To generate a secret key:
#   python3 -c "import secrets; print(secrets.token_hex(32))"
#
apiVersion: v1
kind: Secret
metadata:
  name: zulip-secret
  namespace: nekazari
  labels:
    app: zulip
type: Opaque
stringData:
  db-password: "CHANGE_ME"
  rabbitmq-user: "zulip"
  rabbitmq-password: "CHANGE_ME"
  secret-key: "CHANGE_ME_LONG_RANDOM_STRING"
  oidc-client-secret: "FROM_KEYCLOAK"
